<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SELECTORS</title>
    <style>
        /*
        1.syntax selectors syntax
        element{
        property:value;
        }
        */
        div{
            width:200px;
            height:200px;
            background-color:red;
        }
        /*
        2.ID Selector Syntax 
        element#id{
        property:value;
        }
        */
        span#a1{
            display:block;
            width:200px;
            height:200px;
            background-color:green;
        }
        /*
        class selector syntax
        element.id{
        property:value;
        }
        */
        span.b1{
            display:block;
            width:200px;
            height:200px;
            background-color:purple;
        }
        /*
        4.Attribute selector Syntax 
        element[name=value]{
        }
        */
        a[href="https://www.google.com"]{
            display:block;
            width:200px;
            height:200px;background-color:lavender;
        }
    </style>
</head>
<body>
    <div>CSS Element Selector </div>
    <span id="a1">CSS Id Selector. #</span>
    <span class="b1">CSS Class Selector</span>
    <a href="https://www.google.com">CSS Attribute Selector</a> 
</body>
</html>
