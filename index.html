<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS SELECTORS</title>
    <style>
        /*
        1.syntax selectors syntax
        element{
        property:value;
        }
        */
        div{
            width:200px;
            height:200px;
            background-color:red;
        }
        /*
        2.ID Selector Syntax 
        element#id{
        property:value;
        }
        */
        span#a1{
            display:block;
            width:200px;
            height:200px;
            background-color:green;
        }
        /*
        class selector syntax
        element.id{
        property:value;
        }
        */
        span.b1{
            display:block;
            width:200px;
            height:200px;
            background-color:purple;
        }
        /*
        4.Attribute selector Syntax 
        element[name=value]{
        }
        */
        a[href="https://www.google.com"]{
            display:block;
            width:200px;
            height:200px;background-color:lavender;
        }
        /*universal selector syntax
        *{
        property:value;
        }
        */
        *{
            border:10px solid #000;
        }
        /*
        6.Group/combinational selector Syntax
        element1, element2,element3....{
        property:value;
        }
        */
        div,span#a1,span.b1,a[href="https://www.google.com"]{
            display:inline-block;
        }
        /*
        7.css Pesudo element selector::
    element::selector{
        property:value;
    }
*/
h1::after{
    content:url('./giphy.gif')
}
    </style>
</head>
<body>
    <div>CSS Element Selector </div>
    <span id="a1">CSS Id Selector. #</span>
    <span class="b1">CSS Class Selector</span>
    <a href="https://www.google.com">CSS Attribute Selector</a> 
    <h1>css pesudo element selector::</h1>
</body>
</html>
